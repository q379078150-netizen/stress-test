<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>渠道压力测试报告</title>
<style>
* { margin:0;padding:0;box-sizing:border-box }
body { font-family:-apple-system,"PingFang SC",sans-serif; background:#0d1117; color:#c9d1d9; padding:40px; max-width:900px; margin:0 auto }
h1 { font-size:22px; margin-bottom:4px }
.meta { color:#6e7681; font-size:12px; margin-bottom:30px }
.section { background:#161b22; border:1px solid #21262d; border-radius:8px; padding:24px; margin-bottom:20px }
.section h2 { font-size:16px; color:#e6edf3; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid #21262d }
.metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px }
.metric { background:#0d1117; border:1px solid #21262d; border-radius:6px; padding:14px; text-align:center }
.metric .val { font-size:24px; font-weight:700; font-variant-numeric:tabular-nums }
.metric .lbl { font-size:11px; color:#6e7681; margin-top:4px }
.val-ok { color:#3fb950 } .val-warn { color:#d2991d } .val-err { color:#f85149 }
table { width:100%; border-collapse:collapse; font-size:13px; margin-top:12px }
th,td { padding:8px 12px; text-align:right; border-bottom:1px solid #21262d }
th { color:#6e7681; font-weight:500; font-size:12px }
td:first-child,th:first-child { text-align:left }
.score { font-size:56px; font-weight:800; text-align:center; margin:16px 0; font-variant-numeric:tabular-nums }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600 }
.badge-ok { background:#238636; color:#fff }
.badge-warn { background:#9e6a03; color:#fff }
.badge-err { background:#da3633; color:#fff }
.footer { text-align:center; color:#484f58; font-size:11px; margin-top:30px }
code { background:#21262d; padding:2px 6px; border-radius:3px; font-size:12px }
.note { color:#8b949e; font-size:12px; line-height:1.8; margin-top:12px }
</style>
</head>
<body>
<h1>📋 渠道压力测试报告</h1>
<div class="meta" id="reportMeta"></div>

<div class="section">
  <h2>一、总体评估</h2>
  <div class="score" id="reportScore" style="color:#3fb950"></div>
  <div class="metrics">
    <div class="metric"><div class="val" id="totalAll"></div><div class="lbl">总请求</div></div>
    <div class="metric"><div class="val val-ok" id="okAll"></div><div class="lbl">成功</div></div>
    <div class="metric"><div class="val val-ok" id="rateAll"></div><div class="lbl">成功率</div></div>
    <div class="metric"><div class="val val-warn" id="cacheAll"></div><div class="lbl">Cache 命中率（第2轮起）</div></div>
  </div>
  <div class="note" id="scoreNote"></div>
</div>

<div class="section" id="qpsSection"></div>
<div class="section" id="cacheSection"></div>
<div class="section" id="limitSection">
  <h2>四、参数限制</h2>
</div>

<div class="footer">🦞 LOBSTER — 渠道压力测试工具</div>

<script>
var burst = {};
var conv = {};
var limits = ["temperature / top_p / top_k → HTTP 400","thinking budget_tokens → HTTP 400","GPT/OpenAI 缓存 → 优先 /v1/responses 或 /responses","Claude/Anthropic 缓存 → /v1/messages + cache_control"];
var channel = localStorage.getItem("lastChannel") || "https://your-channel.example.com";
var model = localStorage.getItem("lastModel") || "claude-opus-4-8";

document.getElementById("reportMeta").innerHTML = "渠道 <strong>"+channel+"</strong> &nbsp;|&nbsp; 模型 <strong>"+model+"</strong> &nbsp;|&nbsp; "+new Date().toISOString();

function loadBurst(r) {
  if(!r||!r.summary) return;
  burst = r;
  var s=r.summary,l=r.latency;
  var html='<h2>二、并发性能 (Burst 独立请求)</h2>';
  html+='<div class="metrics">';
  html+='<div class="metric"><div class="val">'+s.totalDone+'</div><div class="lbl">总请求</div></div>';
  html+='<div class="metric"><div class="val val-ok">'+s.success+'</div><div class="lbl">成功</div></div>';
  html+='<div class="metric"><div class="val val-ok">'+s.successRate+'</div><div class="lbl">成功率</div></div>';
  html+='<div class="metric"><div class="val">'+s.qps+'</div><div class="lbl">QPS</div></div>';
  html+='</div>';
  html+='<p style="color:#6e7681;font-size:12px;margin-top:8px">并发: '+(r.config?r.config.concurrency:'?')+' &nbsp; 时长: '+s.duration+'</p>';
  html+='<table>';
  html+='<tr><th>延迟指标</th><th>值 (s)</th></tr>';
  html+='<tr><td>平均</td><td><strong style="color:#58a6ff">'+(l.avg/1000).toFixed(3)+'</strong></td></tr>';
  html+='<tr><td>最小</td><td>'+(l.min/1000).toFixed(3)+'</td></tr>';
  html+='<tr><td>最大</td><td>'+(l.max/1000).toFixed(3)+'</td></tr>';
  html+='<tr><td>P50</td><td>'+(l.p50/1000).toFixed(3)+'</td></tr>';
  html+='<tr><td>P95</td><td><strong>'+(l.p95/1000).toFixed(3)+'</strong></td></tr>';
  html+='<tr><td>P99</td><td>'+(l.p99/1000).toFixed(3)+'</td></tr>';
  html+='</table>';
  if((r.config && r.config.mode === "image") && r.imageCaseStats){
    var statRows=function(title,map){
      var keys=Object.keys(map||{}).sort();
      if(!keys.length) return "";
      var total=keys.reduce(function(sum,key){return sum+(Number(map[key])||0);},0)||1;
      var out='<table><tr><th colspan="3" style="text-align:left">'+title+'</th></tr><tr><th>项目</th><th>数量</th><th>占比</th></tr>';
      keys.forEach(function(key){
        var count=Number(map[key])||0;
        out+='<tr><td>'+key+'</td><td>'+count+'</td><td>'+((count/total)*100).toFixed(1)+'%</td></tr>';
      });
      out+='</table>';
      return out;
    };
    html+='<h2 style="font-size:14px;color:#e6edf3;margin-top:20px;padding-top:14px;border-top:1px solid #21262d">🧩 混合生图分布</h2>';
    html+=statRows("工作类型",r.imageCaseStats.workload);
    html+=statRows("尺寸",r.imageCaseStats.size);
    html+=statRows("清晰度档位",r.imageCaseStats.quality);
  }
  document.getElementById("qpsSection").innerHTML=html;
  updateGrade();
}

function loadConv(r) {
  if(!r||!r.summary) return;
  conv = r;
  var s=r.summary,l=r.latency;
  var html='<h2>三、Prompt Cache 能力</h2>';
  html+='<div class="metrics">';
  html+='<div class="metric"><div class="val">'+s.totalDone+'</div><div class="lbl">总请求</div></div>';
  html+='<div class="metric"><div class="val val-ok">'+s.success+'</div><div class="lbl">成功</div></div>';
  html+='<div class="metric"><div class="val val-warn">'+(s.cacheHitDisplay || s.cacheHitRate || "N/A")+'</div><div class="lbl">Cache 命中率（第2轮起）</div></div>';
  html+='</div>';
  if(r.perTurnCache && r.perTurnCache.length){
    html+='<p style="color:#6e7681;font-size:12px;margin-top:8px">第1轮用于创建缓存，不计入总命中率；主命中率从第2轮开始统计。</p>';
    html+='<table><tr><th>轮次</th><th>缓存命中</th><th>命中率</th></tr>';
    r.perTurnCache.forEach(function(t){
      var turnNum=parseInt(t.turn,10);
      var isCreateTurn=turnNum===1;
      var b=isCreateTurn?'badge-warn':(parseFloat(t.rate)>=50?'badge-ok':parseFloat(t.rate)>0?'badge-warn':'badge-err');
      var hitText=isCreateTurn?(t.hits+'/'+t.total+'（不计总命中）'):(t.hits+'/'+t.total);
      html+='<tr><td>第'+t.turn+'轮</td><td>'+hitText+'</td><td><span class="badge '+b+'">'+t.rate+'%</span></td></tr>';
    });
    html+='</table>';
  }
  html+='<p style="color:#6e7681;font-size:12px;margin-top:8px">接口: GPT/OpenAI 优先走 /v1/responses 或 /responses；Claude/Anthropic 走 /v1/messages + cache_control</p>';
  document.getElementById("cacheSection").innerHTML=html;
  updateGrade();
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function lowerBetterScore(sec, goodSec, badSec, weight) {
  if (!Number.isFinite(sec) || sec <= 0) return weight;
  if (sec <= goodSec) return weight;
  if (sec >= badSec) return 0;
  return weight * (1 - ((sec - goodSec) / (badSec - goodSec)));
}

function getImageLatencyProfile(imageSize) {
  var size = String(imageSize || "1024x1024").toLowerCase();
  if (size === "2560x1440") return { label: "2K", avgGood: 20, avgBad: 55, p95Good: 30, p95Bad: 75 };
  if (size === "3840x2160") return { label: "4K", avgGood: 35, avgBad: 90, p95Good: 50, p95Bad: 120 };
  return { label: "1K", avgGood: 12, avgBad: 35, p95Good: 20, p95Bad: 50 };
}

function updateGrade() {
  var allSuccess = (burst.summary?parseInt(burst.summary.success):0) + (conv.summary?parseInt(conv.summary.success):0);
  var allTotal = (burst.summary?parseInt(burst.summary.totalDone):0) + (conv.summary?parseInt(conv.summary.totalDone):0);
  var rate = allTotal>0 ? (allSuccess/allTotal*100) : 0;
  var burstDone = burst.summary ? (parseInt(burst.summary.totalDone) || 0) : 0;
  var convDone = conv.summary ? (parseInt(conv.summary.totalDone) || 0) : 0;
  var totalWeight = Math.max(1, burstDone + convDone);
  var avgMs = ((burst.latency ? Number(burst.latency.avg || 0) * burstDone : 0) + (conv.latency ? Number(conv.latency.avg || 0) * convDone : 0)) / totalWeight;
  var p95Ms = ((burst.latency ? Number(burst.latency.p95 || 0) * burstDone : 0) + (conv.latency ? Number(conv.latency.p95 || 0) * convDone : 0)) / totalWeight;
  var rateLimited = (burst.summary ? (parseInt(burst.summary.rateLimited) || 0) : 0) + (conv.summary ? (parseInt(conv.summary.rateLimited) || 0) : 0);
  var rateLimitRatio = allTotal > 0 ? (rateLimited / allTotal) : 0;
  var cacheRate = conv.summary ? (parseFloat(conv.summary.cacheHitRate) || 0) : null;
  var isImageReport = burst.config && burst.config.mode === "image";
  var imageProfile = isImageReport ? getImageLatencyProfile(burst.config && burst.config.imageSize) : null;
  var isCacheProbe = !!conv.summary;
  var successWeight = isCacheProbe ? 25 : 40;
  var avgWeight = isCacheProbe ? 15 : 20;
  var p95Weight = isCacheProbe ? 10 : 15;
  var cacheWeight = isCacheProbe ? 35 : 15;
  var successScore = successWeight * clamp((rate - 60) / 40, 0, 1);
  var avgScore = lowerBetterScore(avgMs / 1000, isImageReport ? imageProfile.avgGood : 2, isImageReport ? imageProfile.avgBad : 12, avgWeight);
  var p95Score = lowerBetterScore(p95Ms / 1000, isImageReport ? imageProfile.p95Good : 5, isImageReport ? imageProfile.p95Bad : 20, p95Weight);
  var rateLimitScore = 10 * clamp(1 - (rateLimitRatio / 0.10), 0, 1);
  var cacheScore = cacheRate == null ? cacheWeight : (cacheWeight * clamp(cacheRate / 100, 0, 1));
  var score = Math.round((successScore + avgScore + p95Score + rateLimitScore + cacheScore) * 10) / 10;
  var gc = score >= 88 ? "#3fb950" : score >= 78 ? "#58a6ff" : score >= 65 ? "#d2991d" : "#f85149";
  document.getElementById("reportScore").textContent=score.toFixed(1);
  document.getElementById("reportScore").style.color=gc;
  document.getElementById("totalAll").textContent=allTotal;
  document.getElementById("okAll").textContent=allSuccess;
  document.getElementById("rateAll").textContent=rate.toFixed(1)+"%";
  var cc = conv.summary ? conv.summary.cacheHitRate : "N/A";
  document.getElementById("cacheAll").textContent=cc;
  document.getElementById("scoreNote").textContent =
    "综合评分 /100：成功率 " + rate.toFixed(1) + "%（" + successScore.toFixed(1) + "/" + successWeight + "）" +
    " · 平均延迟 " + (avgMs/1000).toFixed(3) + "s（" + avgScore.toFixed(1) + "/" + avgWeight + "）" +
    " · P95 " + (p95Ms/1000).toFixed(3) + "s（" + p95Score.toFixed(1) + "/" + p95Weight + "）" +
    " · 429占比 " + (rateLimitRatio*100).toFixed(1) + "%（" + rateLimitScore.toFixed(1) + "/10）" +
    " · Cache命中率 " + (cacheRate == null ? "N/A" : (cacheRate.toFixed(1) + "%")) + "（" + cacheScore.toFixed(1) + "/" + cacheWeight + "）" +
    (isImageReport && imageProfile ? (" · 图片评分线 " + imageProfile.label) : "");

  var lhtml = '<table><tr><th>序号</th><th>限制项</th></tr>';
  limits.forEach(function(l,i){ lhtml+='<tr><td>'+(i+1)+'</td><td style="text-align:left">'+l+'</td></tr>'; });
  lhtml+='</table>';
  document.getElementById("limitSection").innerHTML='<h2>四、参数限制</h2>'+lhtml;
}

function init() {
  var burstRaw = localStorage.getItem("lastBurst");
  var convRaw = localStorage.getItem("lastConv");
  if(burstRaw) try { loadBurst(JSON.parse(burstRaw)); } catch(e) {}
  if(convRaw) try { loadConv(JSON.parse(convRaw)); } catch(e) {}
}
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>渠道压力测试报告</title>
<style>
* { margin:0;padding:0;box-sizing:border-box }
body { font-family:-apple-system,"PingFang SC",sans-serif; background:#0d1117; color:#c9d1d9; padding:40px; max-width:900px; margin:0 auto }
h1 { font-size:22px; margin-bottom:4px }
.meta { color:#6e7681; font-size:12px; margin-bottom:30px }
.section { background:#161b22; border:1px solid #21262d; border-radius:8px; padding:24px; margin-bottom:20px }
.section h2 { font-size:16px; color:#e6edf3; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid #21262d }
.metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px }
.metric { background:#0d1117; border:1px solid #21262d; border-radius:6px; padding:14px; text-align:center }
.metric .val { font-size:24px; font-weight:700; font-variant-numeric:tabular-nums }
.metric .lbl { font-size:11px; color:#6e7681; margin-top:4px }
.val-ok { color:#3fb950 } .val-warn { color:#d2991d } .val-err { color:#f85149 }
table { width:100%; border-collapse:collapse; font-size:13px; margin-top:12px }
th,td { padding:8px 12px; text-align:right; border-bottom:1px solid #21262d }
th { color:#6e7681; font-weight:500; font-size:12px }
td:first-child,th:first-child { text-align:left }
.grade { font-size:64px; font-weight:800; text-align:center; margin:16px 0 }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600 }
.badge-ok { background:#238636; color:#fff }
.badge-warn { background:#9e6a03; color:#fff }
.badge-err { background:#da3633; color:#fff }
.footer { text-align:center; color:#484f58; font-size:11px; margin-top:30px }
code { background:#21262d; padding:2px 6px; border-radius:3px; font-size:12px }
</style>
</head>
<body>
<h1>📋 渠道压力测试报告</h1>
<div class="meta" id="reportMeta"></div>

<div class="section">
  <h2>一、总体评估</h2>
  <div class="grade" id="reportGrade" style="color:#3fb950"></div>
  <div class="metrics">
    <div class="metric"><div class="val" id="totalAll"></div><div class="lbl">总请求</div></div>
    <div class="metric"><div class="val val-ok" id="okAll"></div><div class="lbl">成功</div></div>
    <div class="metric"><div class="val val-ok" id="rateAll"></div><div class="lbl">成功率</div></div>
    <div class="metric"><div class="val val-warn" id="cacheAll"></div><div class="lbl">Cache 命中率</div></div>
  </div>
</div>

<div class="section" id="qpsSection"></div>
<div class="section" id="cacheSection"></div>
<div class="section" id="limitSection">
  <h2>四、参数限制</h2>
</div>

<div class="footer">🦞 LOBSTER — 渠道压力测试工具</div>

<script>
var burst = {};
var conv = {};
var limits = ["temperature / top_p / top_k → HTTP 400","thinking budget_tokens → HTTP 400","/v1/chat/completions → 无 Prompt Cache","/v1/messages + anthropic-beta → Prompt Cache ✅"];
var channel = localStorage.getItem("lastChannel") || "https://your-channel.example.com";
var model = localStorage.getItem("lastModel") || "claude-opus-4-8";

document.getElementById("reportMeta").innerHTML = "渠道 <strong>"+channel+"</strong> &nbsp;|&nbsp; 模型 <strong>"+model+"</strong> &nbsp;|&nbsp; "+new Date().toISOString();

function loadBurst(r) {
  if(!r||!r.summary) return;
  burst = r;
  var s=r.summary,l=r.latency;
  var html='<h2>二、并发性能 (Burst 独立请求)</h2>';
  html+='<div class="metrics">';
  html+='<div class="metric"><div class="val">'+s.totalDone+'</div><div class="lbl">总请求</div></div>';
  html+='<div class="metric"><div class="val val-ok">'+s.success+'</div><div class="lbl">成功</div></div>';
  html+='<div class="metric"><div class="val val-ok">'+s.successRate+'</div><div class="lbl">成功率</div></div>';
  html+='<div class="metric"><div class="val">'+s.qps+'</div><div class="lbl">QPS</div></div>';
  html+='</div>';
  html+='<p style="color:#6e7681;font-size:12px;margin-top:8px">并发: '+(r.config?r.config.concurrency:'?')+' &nbsp; 时长: '+s.duration+'</p>';
  html+='<table>';
  html+='<tr><th>延迟指标</th><th>值 (ms)</th></tr>';
  html+='<tr><td>平均</td><td><strong style="color:#58a6ff">'+l.avg.toFixed(1)+'</strong></td></tr>';
  html+='<tr><td>最小</td><td>'+l.min.toFixed(1)+'</td></tr>';
  html+='<tr><td>最大</td><td>'+l.max.toFixed(1)+'</td></tr>';
  html+='<tr><td>P50</td><td>'+l.p50.toFixed(1)+'</td></tr>';
  html+='<tr><td>P95</td><td><strong>'+l.p95.toFixed(1)+'</strong></td></tr>';
  html+='<tr><td>P99</td><td>'+l.p99.toFixed(1)+'</td></tr>';
  html+='</table>';
  document.getElementById("qpsSection").innerHTML=html;
  updateGrade();
}

function loadConv(r) {
  if(!r||!r.summary) return;
  conv = r;
  var s=r.summary,l=r.latency;
  var html='<h2>三、Prompt Cache 能力</h2>';
  html+='<div class="metrics">';
  html+='<div class="metric"><div class="val">'+s.totalDone+'</div><div class="lbl">总请求</div></div>';
  html+='<div class="metric"><div class="val val-ok">'+s.success+'</div><div class="lbl">成功</div></div>';
  html+='<div class="metric"><div class="val val-warn">'+s.cacheHitRate+'</div><div class="lbl">Cache 命中率</div></div>';
  html+='</div>';
  if(r.perTurnCache && r.perTurnCache.length){
    html+='<table><tr><th>轮次</th><th>缓存命中</th><th>命中率</th></tr>';
    r.perTurnCache.forEach(function(t){
      var b=parseFloat(t.rate)>=50?'badge-ok':parseFloat(t.rate)>0?'badge-warn':'badge-err';
      html+='<tr><td>第'+t.turn+'轮</td><td>'+t.hits+'/'+t.total+'</td><td><span class="badge '+b+'">'+t.rate+'%</span></td></tr>';
    });
    html+='</table>';
  }
  html+='<p style="color:#6e7681;font-size:12px;margin-top:8px">接口: /v1/messages + cache_control &nbsp;|&nbsp; 第1轮写入 → 第2轮起读取</p>';
  document.getElementById("cacheSection").innerHTML=html;
  updateGrade();
}

function updateGrade() {
  var allSuccess = (burst.summary?parseInt(burst.summary.success):0) + (conv.summary?parseInt(conv.summary.success):0);
  var allTotal = (burst.summary?parseInt(burst.summary.totalDone):0) + (conv.summary?parseInt(conv.summary.totalDone):0);
  var rate = allTotal>0 ? (allSuccess/allTotal*100).toFixed(0) : "0";
  var grade = rate>=95 ? "A+" : rate>=80 ? "A" : rate>=60 ? "B" : "C";
  var gc = rate>=95 ? "#3fb950" : rate>=80 ? "#58a6ff" : "#d2991d";
  document.getElementById("reportGrade").textContent=grade;
  document.getElementById("reportGrade").style.color=gc;
  document.getElementById("totalAll").textContent=allTotal;
  document.getElementById("okAll").textContent=allSuccess;
  document.getElementById("rateAll").textContent=rate+"%";
  var cc = conv.summary ? conv.summary.cacheHitRate : "N/A";
  document.getElementById("cacheAll").textContent=cc;

  var lhtml = '<table><tr><th>序号</th><th>限制项</th></tr>';
  limits.forEach(function(l,i){ lhtml+='<tr><td>'+(i+1)+'</td><td style="text-align:left">'+l+'</td></tr>'; });
  lhtml+='</table>';
  document.getElementById("limitSection").innerHTML='<h2>四、参数限制</h2>'+lhtml;
}

function init() {
  var burstRaw = localStorage.getItem("lastBurst");
  var convRaw = localStorage.getItem("lastConv");
  if(burstRaw) try { loadBurst(JSON.parse(burstRaw)); } catch(e) {}
  if(convRaw) try { loadConv(JSON.parse(convRaw)); } catch(e) {}
}
init();
</script>
</body>
</html>
